<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqualex Amazon PRO</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="nav">
<button onclick="show('shop')">🏠 Shop</button>
<button onclick="show('cartPage')">🛒 Panier</button>
<button onclick="show('favPage')">❤️ Favoris</button>
<button onclick="show('ordersPage')">📦 Commandes</button>
<button onclick="show('contact')">📞 Contact</button>
<button onclick="show('admin')">⚙ Admin</button>
</div>

<div>
🛒 <span id="count" class="badge">0</span>
</div>
</header>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>Bienvenue sur Aqualex</h2>

<input id="user" placeholder="Nom utilisateur"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<input id="email" placeholder="Email">
<input id="phone" placeholder="Téléphone">
<input id="address" placeholder="Adresse">
<input id="region" placeholder="Région">
<input id="country" placeholder="Pays">

<br><br>

<button onclick="login()">Connexion</button>
<button onclick="register()">Créer compte</button>
</div>

<!-- SHOP -->
<div id="shop" class="container page"></div>

<!-- PANIER -->
<div id="cartPage" class="page">
<h2>🛒 Panier</h2>
<div id="cart"></div>
<h3 id="total"></h3>
<button onclick="pay()">Payer</button>
</div>

<!-- FAVORIS -->
<div id="favPage" class="page">
<h2>❤️ Favoris</h2>
<div id="fav"></div>
</div>

<!-- COMMANDES -->
<div id="ordersPage" class="page">
<h2>📦 Commandes</h2>
<div id="orders"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>⚙ Admin</h2>

<input id="n" placeholder="Nom produit">
<input id="p" placeholder="Prix">
<input id="d" placeholder="Description">
<input id="i" placeholder="Image">

<button onclick="addProduct()">Ajouter</button>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
<h2>📞 Contact</h2>

<p>Aqualex Piscines PRO</p>
<p>07 00 00 00 00</p>
<p>contact@aqualex.fr</p>
</div>

<script src="script.js"></script>

</body>
</html>
